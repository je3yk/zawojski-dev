name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      VITE_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_POSTHOG_PROJECT_TOKEN }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify PostHog environment variables
        run: |
          sanitize() {
            local value="$1"
            local length="${#value}"

            if [ "$length" -le 8 ]; then
              echo "***"
            else
              echo "${value:0:4}...${value: -4}"
            fi
          }

          missing=0

          if [ -z "$VITE_POSTHOG_PROJECT_TOKEN" ]; then
            echo "::error::VITE_POSTHOG_PROJECT_TOKEN is not set"
            missing=1
          else
            echo "VITE_POSTHOG_PROJECT_TOKEN=$(sanitize "$VITE_POSTHOG_PROJECT_TOKEN")"
          fi

          if [ -z "$VITE_POSTHOG_HOST" ]; then
            echo "::error::VITE_POSTHOG_HOST is not set"
            missing=1
          else
            echo "VITE_POSTHOG_HOST=$VITE_POSTHOG_HOST"
          fi

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Build
        run: bun run build -- --base "./"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
